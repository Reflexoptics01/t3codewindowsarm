name: Windows ARM64 App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sync_upstream:
        description: "Merge upstream main before building"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "25 */6 * * *"

permissions:
  contents: write

concurrency:
  group: windows-arm64-app
  cancel-in-progress: false

jobs:
  build_release:
    name: Build and publish Windows ARM64 installer
    runs-on: windows-11-arm
    timeout-minutes: 60
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge upstream main
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_upstream != 'false')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/pingdotgg/t3code.git
          git fetch upstream main --tags
          git merge --no-edit upstream/main
          git push origin HEAD:main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pkg = Get-Content apps/server/package.json | ConvertFrom-Json
          $baseVersion = [string]$pkg.version
          # Strip any prior fork build suffix so re-runs stay monotonic.
          if ($baseVersion -match '^(\d+\.\d+\.\d+)(?:-arm64\.\d+)?$') {
            $baseVersion = $Matches[1]
          }
          $releaseVersion = "$baseVersion-arm64.${{ github.run_number }}"
          "release_version=$releaseVersion" >> $env:GITHUB_OUTPUT
          "tag=v$releaseVersion" >> $env:GITHUB_OUTPUT
          "name=T3 Code Windows ARM64 v$releaseVersion" >> $env:GITHUB_OUTPUT

      - name: Bump package versions for release
        run: node scripts/update-release-package-versions.ts "${{ steps.version.outputs.release_version }}"

      - name: Build Windows ARM64 installer
        shell: pwsh
        env:
          T3CODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          bun run dist:desktop:win:arm64 -- --verbose

      - name: Ensure update manifest uses standard name
        shell: pwsh
        run: |
          if (Test-Path "release/latest-arm64.yml") {
            Move-Item -Force "release/latest-arm64.yml" "release/latest.yml"
          }
          if (Test-Path "release/nightly-arm64.yml") {
            Move-Item -Force "release/nightly-arm64.yml" "release/nightly.yml"
          }

      - name: Publish fork release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: main
          name: ${{ steps.version.outputs.name }}
          body: |
            Windows ARM64 fork build.

            Version: `${{ steps.version.outputs.release_version }}`
            Built from `${{ github.repository }}@${{ github.sha }}`.
            Upstream sync source: `pingdotgg/t3code@main`.
          make_latest: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
            release/nightly*.yml
